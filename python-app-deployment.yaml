apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-vault-app-deployment
  labels:
    app: python-vault-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-vault-app
  template:
    metadata:
      labels:
        app: python-vault-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "python-vault-policy-role"
        vault.hashicorp.com/agent-inject-secret-realm.xml: "secret/data/python-vault/realm"
        vault.hashicorp.com/agent-inject-template-realm.xml: |
          {{- with secret "secret/data/python-vault/realm" -}}
          {{ .Data.data.realm_xml }}
          {{- end -}}
    spec:
      serviceAccountName: default
      containers:
      - name: python-vault-container
        image: python-vault-validation:1.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: VAULT_SECRET_FILE
          value: /vault/secrets/realm.xml
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /secret-required
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /_ping
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-vault-app-service
spec:
  type: ClusterIP
  selector:
    app: python-vault-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
